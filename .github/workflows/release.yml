name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

# Quieter Node 20 deprecation warnings until actions default to Node 24.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos:
    name: macOS (DMG + PKG)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Ninja
        run: brew install ninja

      - name: Configure & build
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel

      - name: Package
        run: |
          chmod +x packaging/build_mac_dmg.sh packaging/build_mac_pkg.sh
          ./packaging/build_mac_dmg.sh Release
          ./packaging/build_mac_pkg.sh Release

      - uses: actions/upload-artifact@v4
        with:
          name: truck-packer-macos
          path: |
            packaging/*.dmg
            packaging/*.pkg
          if-no-files-found: error

  windows:
    name: Windows (ZIP + EXE)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install WebView2 NuGet package (for JUCE NEEDS_WEBVIEW2)
        shell: pwsh
        run: |
          $pkgRoot = "${env:GITHUB_WORKSPACE}/.nuget-webview2"
          New-Item -ItemType Directory -Force -Path $pkgRoot | Out-Null
          Invoke-WebRequest -Uri "https://dist.nuget.org/win-x86-commandline/latest/nuget.exe" -OutFile "$pkgRoot/nuget.exe"
          & "$pkgRoot/nuget.exe" install Microsoft.Web.WebView2 -Version 1.0.2849.39 -OutputDirectory $pkgRoot
          "JUCE_WEBVIEW2_PACKAGE_LOCATION=$pkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Add Inno Setup to PATH
        shell: pwsh
        run: |
          $inno = "${env:ProgramFiles(x86)}\Inno Setup 6"
          if (Test-Path $inno) { Add-Content $env:GITHUB_PATH $inno }

      - name: Build & package
        shell: pwsh
        run: |
          & "${{ github.workspace }}/packaging/build_win_installer.ps1" -Config Release

      - uses: actions/upload-artifact@v4
        with:
          name: truck-packer-windows
          path: |
            packaging/*.zip
            packaging/*-Windows-Setup.exe
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: [macos, windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: truck-packer-*
          path: artifacts
          merge-multiple: true

      - name: Flatten files for release upload
        run: |
          mkdir -p upload
          find artifacts -type f -exec cp -t upload/ {} +
          ls -la upload/

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Truck Packer ${{ github.ref_name }}
          generate_release_notes: true
          make_latest: true
          files: upload/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
